<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoxelCraft</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; }
    body { font-family: monospace; background: #87CEEB; }
    #app { width: 100vw; height: 100vh; position: relative; }
    canvas { display: block; }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(0, 0, 0, 0.7);
      color: white;
      cursor: pointer;
      z-index: 100;
    }
    #overlay h1 { font-size: 2.5rem; margin-bottom: 1rem; }
    #overlay p { font-size: 1.1rem; opacity: 0.8; line-height: 1.8; text-align: center; }
    #overlay .controls { margin-top: 2rem; font-size: 0.9rem; opacity: 0.6; }
    #crosshair {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 20px; height: 20px;
      pointer-events: none;
      z-index: 50;
    }
    #crosshair::before, #crosshair::after {
      content: '';
      position: absolute;
      background: white;
      opacity: 0.7;
    }
    #crosshair::before {
      top: 50%; left: 0;
      width: 100%; height: 2px;
      transform: translateY(-50%);
    }
    #crosshair::after {
      left: 50%; top: 0;
      width: 2px; height: 100%;
      transform: translateX(-50%);
    }
    #hotbar {
      position: absolute;
      bottom: 20px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 4px;
      padding: 4px;
      background: rgba(0, 0, 0, 0.4);
      border-radius: 4px;
      z-index: 50;
    }
    .hotbar-slot {
      width: 50px; height: 50px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-radius: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.2rem;
      color: white;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .hotbar-slot.active {
      border-color: white;
      box-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
    }
    #debug {
      position: absolute;
      top: 10px; left: 10px;
      color: white;
      font-size: 0.85rem;
      line-height: 1.6;
      text-shadow: 1px 1px 2px black;
      z-index: 50;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="overlay">
      <h1>VoxelCraft</h1>
      <p>Click to Play</p>
      <div class="controls">
        WASD — Move &nbsp;|&nbsp; Mouse — Look &nbsp;|&nbsp; Space — Jump<br>
        Left Click — Break &nbsp;|&nbsp; Right Click — Place &nbsp;|&nbsp; 1-8 — Select Block
      </div>
    </div>
    <div id="crosshair"></div>
    <div id="hotbar"></div>
    <div id="debug"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
